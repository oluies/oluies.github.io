        de: 'Kuratierte Liste von Apache-Spark-Paketen und -Ressourcen — gemergte Ergänzungen (Polynote, ModelDB, Optimus u. a.).',
        fr: 'Liste sélective de paquets et ressources Apache Spark — ajouts fusionnés (Polynote, ModelDB, Optimus, etc.).',
        uk: 'Кураторський список пакетів і ресурсів Apache Spark — злиті доповнення (Polynote, ModelDB, Optimus та інші).'
      } },
      { name: 'rtk-ai/rtk', url: 'https://github.com/rtk-ai/rtk/pulls?q=is%3Apr+author%3Aoluies', d: {
        sv: 'CLI-proxy som optimerar LLM-tokens — PR:er: kontextvalidering, skydd mot prompt-injektion och regressionstest för proxyn.',
        en: 'LLM token-optimising CLI proxy — PRs: execution-context validation, prompt-injection scanning, and a proxy regression test.',
        de: 'CLI-Proxy zur LLM-Token-Optimierung — PRs: Kontextvalidierung, Prompt-Injection-Scan und ein Proxy-Regressionstest.',
        fr: 'Proxy CLI optimisant les tokens LLM — PR : validation du contexte d’exécution, détection d’injection de prompt et test de régression du proxy.',
        uk: 'CLI-проксі для оптимізації токенів LLM — PR: валідація контексту виконання, виявлення ін’єкцій промптів і регресійний тест проксі.'
      } }
    ]

    const INDUSTRIES = [
      { sv: 'Finans', en: 'Finance', de: 'Finanzwesen', fr: 'Finance', uk: 'Фінанси' },
      { sv: 'Telekom', en: 'Telecoms', de: 'Telekommunikation', fr: 'Télécoms', uk: 'Телеком' }
    ]
    const EXPERTISE = [
      { sv: 'Business intelligence', en: 'Business intelligence', de: 'Business Intelligence', fr: 'Business intelligence', uk: 'Бізнес-аналітика (BI)' },
      { sv: 'Data engineering', en: 'Data engineering', de: 'Data Engineering', fr: 'Data engineering', uk: 'Інженерія даних' }
    ]
    const PROGRAMMING = ['Scala', 'C++', 'Java', 'Python']
    const EDU = [
      { sv: 'Kandidatexamen i systemvetenskap', en: 'BSc in Systems Analysis', de: 'B.Sc. in Systemanalyse', fr: 'Licence en analyse de systèmes', uk: 'Бакалавр із системного аналізу' },
      { sv: 'Masterexamen i mjukvaruutveckling', en: 'MSc in Software Development', de: 'M.Sc. in Softwareentwicklung', fr: 'Master en développement logiciel', uk: 'Магістр із розробки ПЗ' }
    ]

    let lang = 'en'
    const $ = id => document.getElementById(id)

    function card(item, kind) {
      const a = document.createElement('a')
      a.className = 'card'
      a.href = kind === 'repo' ? item.repo : item.url
      a.rel = 'noopener'
      const name = document.createElement('div')
      name.className = 'name'
      name.textContent = item.name
      const desc = document.createElement('div')
      desc.className = 'desc'
      desc.textContent = item.d[lang]
      const foot = document.createElement('div')
      foot.className = 'foot'
      const chip = document.createElement('span')
      if (kind === 'demo') { chip.className = 'chip live'; chip.textContent = '● ' + UI.live[lang] }
      else if (kind === 'contrib') { chip.className = 'chip'; chip.textContent = 'PRs' }
      else { chip.className = 'chip'; chip.textContent = 'GitHub' }
      const go = document.createElement('span')
      go.className = 'go'
      go.textContent = kind === 'demo' ? UI.open[lang] : kind === 'contrib' ? UI.viewprs[lang] : UI.source[lang]
      foot.appendChild(chip); foot.appendChild(go)
      a.appendChild(name); a.appendChild(desc); a.appendChild(foot)
      return a
    }

    function render() {
      document.documentElement.lang = lang
      $('tagline').textContent = UI.tagline[lang]
      const pron = $('pron'); pron.innerHTML = UI.pron[lang]; pron.hidden = !UI.pron[lang]
      $('ind-label').textContent = UI.indLabel[lang]
      $('exp-label').textContent = UI.expLabel[lang]
      $('prog-label').textContent = UI.progLabel[lang]
      $('edu-label').textContent = UI.eduLabel[lang]
      const chipRow = (host, items) => { const el = $(host); el.innerHTML = ''
        items.forEach(x => { const s = document.createElement('span'); s.className = 'chip'; s.textContent = (typeof x === 'string') ? x : x[lang]; el.appendChild(s) }) }
      chipRow('industries', INDUSTRIES)
      chipRow('expertise', EXPERTISE)
      chipRow('programming', PROGRAMMING)
      $('education').textContent = EDU.map(x => x[lang]).join(' · ')
      $('h-demos').textContent = UI.demos[lang]
      $('h-repos').textContent = UI.repos[lang]
      $('h-contrib').textContent = UI.contrib[lang]
      $('foot-note').textContent = UI.foot[lang]
      const d = $('demos'); d.innerHTML = ''
      DEMOS.forEach(x => d.appendChild(card(x, 'demo')))
      const r = $('repos'); r.innerHTML = ''
      REPOS.forEach(x => r.appendChild(card(x, 'repo')))
      const c = $('contribs'); c.innerHTML = ''
      CONTRIBS.forEach(x => c.appendChild(card(x, 'contrib')))
      for (const b of $('langs').children) b.setAttribute('aria-pressed', String(b.dataset.l === lang))
    }

    function setLang(l) {
      lang = l
      try { localStorage.setItem('lang', l) } catch (e) {}
      render()
    }

    const ls = $('langs')
    LANGS.forEach(l => {
      const b = document.createElement('button')
      b.type = 'button'; b.dataset.l = l; b.textContent = LABEL[l]
      b.onclick = () => setLang(l)
      ls.appendChild(b)
    })

    let stored = null
    try { stored = localStorage.getItem('lang') } catch (e) {}
    const nav = (navigator.language || 'en').slice(0, 2).toLowerCase()
    lang = (stored && LANGS.includes(stored)) ? stored : (LANGS.includes(nav) ? nav : 'en')
    render()
  </script>
</body>
</html>
